<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PVP Trainer — Option C: Simple 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    gap: 10px;
  }
  .label { color: #888; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
  .hint { color: #555; font-size: 11px; }

  .wrap {
    position: relative;
    border: 3px solid #444;
  }
  canvas { display: block; }

  /* HUD overlay */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.78);
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    gap: 20px;
  }
  .hp-col { display: flex; flex-direction: column; gap: 5px; }
  .hp-col.right { align-items: flex-end; }
  .hp-label { color: #ccc; font-size: 10px; letter-spacing: 2px; }
  .hp-bg {
    width: 190px; height: 18px;
    background: #222; border: 1px solid #444;
    position: relative; overflow: hidden;
  }
  .hp-fill { height: 100%; transition: width 0.15s; position: relative; }
  .hp-fill::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 50%; background: rgba(255,255,255,0.12);
  }
  .hp-num { color: #777; font-size: 10px; }

  .center {
    flex: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  #combo-text {
    color: #FFD700;
    font-size: 18px;
    font-weight: bold;
    transition: color 0.1s;
  }
  #cps-text { color: #666; font-size: 11px; }

  #click-hint {
    position: absolute;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    pointer-events: none;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="label">🧱 Option C — Simple 3D Geometry (Three.js)</div>

<div class="wrap">
  <!-- HUD -->
  <div id="hud">
    <div class="hp-col">
      <div class="hp-label">PLAYER</div>
      <div class="hp-bg"><div class="hp-fill" id="php" style="width:100%;background:#44CC44"></div></div>
      <div class="hp-num" id="php-num">100 / 100</div>
    </div>

    <div class="center">
      <div id="combo-text">⚔ COMBO ×0</div>
      <div id="cps-text">CPS: 0.0 · Click to attack</div>
    </div>

    <div class="hp-col right">
      <div class="hp-label">ENEMY</div>
      <div class="hp-bg"><div class="hp-fill" id="ehp" style="width:68%;background:#CC4444"></div></div>
      <div class="hp-num" id="ehp-num">68 / 100</div>
    </div>
  </div>

  <canvas id="c"></canvas>
  <div id="click-hint">CLICK TO ATTACK · AUTO-ROTATING TO SHOW 3D DEPTH</div>
</div>

<div class="hint">Option C: Start simple 3D from day one — add voxel terrain later without rewriting</div>

<!-- Three.js from CDN (requires internet) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W = 800, H = 480;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;

// ---- Renderer ----
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ---- Scene & Camera ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 35, 65);

const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 200);
camera.position.set(0, 12, 18);
camera.lookAt(0, 1.5, 0);

// ---- Lights ----
scene.add(new THREE.AmbientLight(0xffffff, 0.45));

const sun = new THREE.DirectionalLight(0xFFF5E0, 1.1);
sun.position.set(12, 22, 10);
sun.castShadow = true;
Object.assign(sun.shadow.camera, { near: 0.1, far: 70, left: -16, right: 16, top: 16, bottom: -16 });
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);

// Torch point lights near each fighter
const torchP = new THREE.PointLight(0xFF8844, 2.0, 7);
torchP.position.set(-3.5, 2.2, 0.5);
scene.add(torchP);

const torchE = new THREE.PointLight(0xFF4422, 2.0, 7);
torchE.position.set(3.5, 2.2, 0.5);
scene.add(torchE);

// ---- Stone texture (canvas-generated) ----
function stoneTexture(size = 128, blocks = 4) {
  const tc = document.createElement('canvas');
  tc.width = tc.height = size;
  const x = tc.getContext('2d');
  const bs = size / blocks;

  x.fillStyle = '#8C8C8C';
  x.fillRect(0, 0, size, size);

  for (let bx = 0; bx < blocks; bx++) {
    for (let by = 0; by < blocks; by++) {
      const px = bx * bs, py = by * bs;
      const v = ((Math.random() * 24 - 12) | 0);
      const b = 138 + v;
      x.fillStyle = `rgb(${b},${b},${b})`;
      x.fillRect(px + 1, py + 1, bs - 2, bs - 2);
      // Highlight edge
      x.fillStyle = 'rgba(255,255,255,0.18)';
      x.fillRect(px + 1, py + 1, bs - 2, 3);
      x.fillRect(px + 1, py + 1, 3, bs - 2);
      // Shadow edge
      x.fillStyle = 'rgba(0,0,0,0.22)';
      x.fillRect(px + 1, py + bs - 4, bs - 2, 3);
      x.fillRect(px + bs - 4, py + 1, 3, bs - 2);
      // Texture specks
      for (let d = 0; d < 5; d++) {
        const dx = (Math.random() * (bs - 8) + 4) | 0;
        const dy = (Math.random() * (bs - 8) + 4) | 0;
        const dv = (Math.random() * 28 - 14) | 0;
        x.fillStyle = `rgba(${b+dv},${b+dv},${b+dv},0.6)`;
        x.fillRect(px + dx, py + dy, 3, 3);
      }
    }
  }
  const t = new THREE.CanvasTexture(tc);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.magFilter = THREE.NearestFilter; // pixelated look
  return t;
}

// ---- Ground ----
const groundTex = stoneTexture(128, 4);
groundTex.repeat.set(5, 5);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshLambertMaterial({ map: groundTex })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ---- Walls & Battlements ----
function box(w, h, d, x, y, z, color, cast = true) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, y, z);
  m.castShadow = cast;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

const WC = 0x787878; // wall color
box(20, 3, 1, 0, 1.5, -10, WC);
box(20, 3, 1, 0, 1.5, 10, WC);
box(1, 3, 20, -10, 1.5, 0, WC);
box(1, 3, 20, 10, 1.5, 0, WC);

// Battlements
for (let i = -9; i <= 9; i += 3) {
  box(1.6, 1.5, 1, i, 3.75, -10, 0x686868);
  box(1.6, 1.5, 1, i, 3.75, 10, 0x686868);
  box(1, 1.5, 1.6, -10, 3.75, i, 0x686868);
  box(1, 1.5, 1.6, 10, 3.75, i, 0x686868);
}

// Torch holders on walls
function torch(x, y, z) {
  box(0.15, 0.5, 0.15, x, y, z, 0x8B5E3C);
  const flame = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.25, 0.2),
    new THREE.MeshBasicMaterial({ color: 0xFF8800 })
  );
  flame.position.set(x, y + 0.35, z);
  scene.add(flame);
  return flame;
}
const flames = [
  torch(-9.5, 2.5, -4), torch(-9.5, 2.5, 4),
  torch(9.5, 2.5, -4),  torch(9.5, 2.5, 4),
];

// ---- Characters ----
function character(xPos, mainColor, isPlayer) {
  const g = new THREE.Group();

  const legCol = isPlayer ? 0x1A3A7A : 0x2A5C1A;
  const armCol = mainColor;
  const skinCol = isPlayer ? 0xD4A270 : 0x79A832;

  // Legs
  const leg1 = meshAdd(g, 0.33, 0.9, 0.33, -0.2, 0.45, 0, legCol);
  const leg2 = meshAdd(g, 0.33, 0.9, 0.33,  0.2, 0.45, 0, legCol);

  // Body
  meshAdd(g, 0.8, 1.05, 0.42, 0, 1.42, 0, mainColor);

  // Arms
  const armL = meshAdd(g, 0.3, 0.9, 0.33, -0.55, 1.36, 0, armCol);
  const armR = meshAdd(g, 0.3, 0.9, 0.33,  0.55, 1.36, 0, armCol);

  // Head
  const head = meshAdd(g, 0.8, 0.8, 0.8, 0, 2.3, 0, skinCol);

  // Eyes
  meshAdd(g, 0.15, 0.12, 0.05, -0.2, 2.34, 0.41, 0x111111);
  meshAdd(g, 0.15, 0.12, 0.05,  0.2, 2.34, 0.41, 0x111111);

  if (isPlayer) {
    // Player: blue eyes
    meshAdd(g, 0.08, 0.08, 0.04, -0.2, 2.34, 0.44, 0x3355ff);
    meshAdd(g, 0.08, 0.08, 0.04,  0.2, 2.34, 0.44, 0x3355ff);
    // Sword (right arm)
    meshAdd(g, 0.1, 0.38, 0.1, 0.82, 1.12, 0, 0x8B5E3C);     // grip
    meshAdd(g, 0.38, 0.08, 0.1, 0.82, 1.38, 0, 0xA8A8A8);     // guard
    meshAdd(g, 0.09, 1.05, 0.06, 0.82, 1.95, 0, 0xDDDDDD);    // blade
    meshAdd(g, 0.04, 0.95, 0.03, 0.82, 1.94, 0.04, 0xF5F5F5); // blade shine
  } else {
    // Zombie: green eyes
    meshAdd(g, 0.08, 0.08, 0.04, -0.2, 2.34, 0.44, 0x44ff00);
    meshAdd(g, 0.08, 0.08, 0.04,  0.2, 2.34, 0.44, 0x44ff00);
    // Damage scar
    meshAdd(g, 0.1, 0.3, 0.05, -0.1, 2.2, 0.41, 0x4A7015);
  }

  g.position.set(xPos, 0, 0);
  g.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  scene.add(g);

  return { group: g, head, armR, leg1, leg2 };
}

function meshAdd(parent, w, h, d, x, y, z, color) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, y, z);
  parent.add(m);
  return m;
}

const player = character(-3, 0x3B5BA5, true);
const enemy  = character( 3, 0x5C8A22, false);

player.group.rotation.y =  Math.PI / 2;   // face right
enemy.group.rotation.y  = -Math.PI / 2;   // face left

// ---- Game State ----
let playerHP = 100, enemyHP = 68;
let combo = 0, comboTimer = 0;
let clicks = [], cps = 0, lastClick = 0;
let atkAnim = 0;
let rotAngle = 0;
let t = 0;
let defeated = false;

function refreshHUD() {
  document.getElementById('php').style.width = playerHP + '%';
  document.getElementById('ehp').style.width = enemyHP + '%';
  document.getElementById('php-num').textContent = `${playerHP} / 100`;
  document.getElementById('ehp-num').textContent = `${enemyHP} / 100`;
  const ct = document.getElementById('combo-text');
  ct.textContent = `⚔ COMBO ×${combo}`;
  ct.style.color = combo >= 10 ? '#FF6600' : combo >= 5 ? '#FF9900' : '#FFD700';
  document.getElementById('cps-text').textContent =
    defeated ? '[ Click to restart ]' : `CPS: ${cps.toFixed(1)} · Click to attack`;
}

// Flash enemy red on hit
function flashEnemy() {
  enemy.group.traverse(c => {
    if (c.isMesh) c.material.emissive = new THREE.Color(0xff2200);
  });
  setTimeout(() => {
    enemy.group.traverse(c => {
      if (c.isMesh) c.material.emissive = new THREE.Color(0x000000);
    });
  }, 100);
}

canvas.addEventListener('click', () => {
  if (defeated) {
    enemyHP = 100; defeated = false; combo = 0; refreshHUD(); return;
  }

  atkAnim = 0.01;
  const now = Date.now();
  clicks.push(now);
  clicks = clicks.filter(ts => now - ts < 1000);
  cps = clicks.length;

  if (now - lastClick < 650) { combo++; }
  else { combo = Math.max(combo > 0 ? combo - 1 : 0, 1); }
  lastClick = now;
  comboTimer = 95;

  const dmg = 4 + combo;
  enemyHP = Math.max(0, enemyHP - dmg);
  flashEnemy();
  if (enemyHP === 0) defeated = true;
  refreshHUD();
});

// ---- Animate ----
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Camera slow orbit
  rotAngle += 0.004;
  const R = 18;
  camera.position.x = Math.sin(rotAngle) * R * 0.55;
  camera.position.z = Math.cos(rotAngle) * R;
  camera.position.y = 12;
  camera.lookAt(0, 1.5, 0);

  // Idle head sway
  player.head.rotation.y = Math.sin(t * 0.7) * 0.12;
  enemy.head.rotation.y = Math.sin(t * 0.6 + 1) * 0.1;

  // Leg walk bob
  player.leg1.rotation.x =  Math.sin(t * 2.2) * 0.18;
  player.leg2.rotation.x = -Math.sin(t * 2.2) * 0.18;
  enemy.leg1.rotation.x  =  Math.sin(t * 1.9 + 0.5) * 0.12;
  enemy.leg2.rotation.x  = -Math.sin(t * 1.9 + 0.5) * 0.12;

  // Enemy idle hover
  enemy.group.position.y = Math.sin(t * 2.8) * 0.04;

  // Attack arm swing
  if (atkAnim > 0) {
    atkAnim = Math.min(atkAnim + 0.07, 1);
    player.armR.rotation.x = atkAnim < 1 ? -Math.PI * 0.7 * Math.sin(atkAnim * Math.PI) : 0;
    if (atkAnim >= 1) { atkAnim = 0; player.armR.rotation.x = 0; }
  }

  // Combo timer reset
  if (comboTimer > 0) { comboTimer--; }
  else { if (combo > 0) { combo = 0; refreshHUD(); } }

  // Torch flicker
  torchP.intensity = 2.0 + Math.sin(t * 9.3) * 0.5;
  torchE.intensity = 2.0 + Math.sin(t * 8.1 + 1) * 0.5;

  // Flame bob
  flames.forEach((f, i) => {
    f.position.y = 2.72 + Math.sin(t * 6 + i) * 0.06;
    f.material.color.setHex(Math.random() > 0.85 ? 0xFFCC00 : 0xFF8800);
  });

  renderer.render(scene, camera);
}

refreshHUD();
animate();
</script>
</body>
</html>

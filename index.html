<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcus's Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2e3e;
      --accent: #6c8ef7; --accent-2: #a78bfa; --text: #e2e8f0;
      --muted: #8892a4; --radius: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 0 1.5rem 4rem; }
    a { color: inherit; text-decoration: none; }
    header { max-width: 900px; margin: 0 auto; padding: 3.5rem 0 2.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .tag { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--text) 40%, var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { color: var(--muted); font-size: 1.05rem; max-width: 480px; line-height: 1.6; margin-top: 0.25rem; }
    .divider { max-width: 900px; margin: 0 auto 2.5rem; border: none; border-top: 1px solid var(--border); }
    .section-title { max-width: 900px; margin: 0 auto 1.25rem; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.4rem 1.5rem 1.3rem; display: flex; flex-direction: column; gap: 0.6rem; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; cursor: pointer; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,142,247,0.12); }
    .card-icon { font-size: 1.5rem; line-height: 1; }
    .card h2 { font-size: 1rem; font-weight: 600; color: var(--text); }
    .card p { font-size: 0.875rem; color: var(--muted); line-height: 1.5; flex: 1; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 0.4rem; }
    .card-date { font-size: 0.75rem; color: var(--muted); opacity: 0.7; }
    .card-arrow { font-size: 0.85rem; color: var(--accent); opacity: 0; transition: opacity 0.15s, transform 0.15s; }
    .card:hover .card-arrow { opacity: 1; transform: translateX(3px); }
    .card-empty { border-style: dashed; opacity: 0.5; cursor: default; }
    .card-empty:hover { transform: none; box-shadow: none; border-color: var(--border); }
    footer { max-width: 900px; margin: 4rem auto 0; font-size: 0.8rem; color: var(--muted); opacity: 0.5; text-align: center; }
  </style>
</head>
<body>
  <header>
    <span class="tag">Marcus's Playground</span>
    <h1>Web Projects</h1>
    <p>A personal hub for experiments, tools, and things I've built — mostly to learn, sometimes to share.</p>
  </header>
  <hr class="divider" />
  <p class="section-title">Projects</p>
  <div class="grid">
    <div class="card card-empty">
      <div class="card-icon">&#10022;</div>
      <h2>First project coming soon</h2>
      <p>Projects will appear here as they're added.</p>
      <div class="card-meta"><span class="card-date">&#8212;</span></div>
    </div>
  </div>
  <footer>Built with HTML &amp; CSS &middot; Hosted on GitHub Pages</footer>
</body>
</html>
